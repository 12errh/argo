name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dev headers
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Publish argo-core
        run: cargo publish -p argo-core --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish argo-memory
        run: cargo publish -p argo-memory --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish argo-heal
        run: cargo publish -p argo-heal --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish argo-tools
        run: cargo publish -p argo-tools --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish argo-mcp
        run: cargo publish -p argo-mcp --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish argo-observe
        run: cargo publish -p argo-observe --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish argo-cli
        run: cargo publish -p argo-cli --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Actually publish crates
        if: github.event_name == 'release' || inputs.dry_run == 'false'
        run: |
          cargo publish -p argo-core
          sleep 30
          cargo publish -p argo-memory
          sleep 30
          cargo publish -p argo-heal
          sleep 30
          cargo publish -p argo-tools
          sleep 30
          cargo publish -p argo-mcp
          sleep 30
          cargo publish -p argo-observe
          sleep 30
          cargo publish -p argo-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install maturin
        run: pip install maturin

      - name: Install Python dev headers
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Build wheel
        run: maturin build --release -o dist/
        working-directory: crates/argo-py

      - name: Publish to PyPI
        if: github.event_name == 'release' || inputs.dry_run == 'false'
        run: maturin upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
        working-directory: crates/argo-py
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Python dev headers
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build NAPI package
        run: napi build --release --target x86_64-unknown-linux-gnu
        working-directory: crates/argo-napi

      - name: Publish to npm
        if: github.event_name == 'release' || inputs.dry_run == 'false'
        run: |
          npm pkg set name="argo-framework"
          npm publish --access public
        working-directory: crates/argo-napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
