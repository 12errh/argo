apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-agent
  namespace: argo-system
  labels:
    app.kubernetes.io/name: argo
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo
        app.kubernetes.io/component: agent
    spec:
      containers:
        - name: argo
          image: ghcr.io/argo-agents/argo:latest
          args: ["run", "--config", "/app/config/agent.toml"]
          envFrom:
            - secretRef:
                name: argo-agent-secrets
          env:
            - name: REDIS_URL
              value: "redis://redis.argo-system.svc.cluster.local:6379"
            - name: SURREAL_URL
              value: "http://surrealdb.argo-system.svc.cluster.local:8000"
            - name: SURREAL_NS
              value: "argo"
            - name: SURREAL_DB
              value: "production"
            - name: QDRANT_URL
              value: "http://qdrant.argo-system.svc.cluster.local:6333"
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: argo-agent-config
        - name: workspace
          emptyDir: {}
      restartPolicy: Always
