apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: argo-system
  labels:
    app.kubernetes.io/name: argo
    app.kubernetes.io/component: qdrant
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
            - name: QDRANT__SERVICE__HTTP_PORT
              value: "6333"
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: qdrant-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: argo-system
  labels:
    app.kubernetes.io/name: argo
    app.kubernetes.io/component: qdrant
spec:
  selector:
    app.kubernetes.io/name: argo
    app.kubernetes.io/component: qdrant
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
  clusterIP: None
