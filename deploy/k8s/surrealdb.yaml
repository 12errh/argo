apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: argo-system
  labels:
    app.kubernetes.io/name: argo
    app.kubernetes.io/component: surrealdb
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argo
      app.kubernetes.io/component: surrealdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argo
        app.kubernetes.io/component: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          ports:
            - containerPort: 8000
          args:
            - "start"
            - "--user"
            - "root"
            - "--pass"
            - "$(SURREAL_ROOT_PASS)"
            - "--log"
            - "warn"
            - "--surreal"
            - "/data"
          env:
            - name: SURREAL_ROOT_PASS
              valueFrom:
                secretKeyRef:
                  name: argo-agent-secrets
                  key: SURREAL_ROOT_PASS
          volumeMounts:
            - name: surreal-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: surreal-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: surrealdb
  namespace: argo-system
  labels:
    app.kubernetes.io/name: argo
    app.kubernetes.io/component: surrealdb
spec:
  selector:
    app.kubernetes.io/name: argo
    app.kubernetes.io/component: surrealdb
  ports:
    - port: 8000
      targetPort: 8000
  clusterIP: None
