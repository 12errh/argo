services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - argo-network

  surrealdb:
    image: surrealdb/surrealdb:latest
    restart: unless-stopped
    user: root
    ports:
      - "8000:8000"
    volumes:
      - surreal_data:/data
    environment:
      SURREAL_USER: root
      SURREAL_PASS: ${SURREAL_ROOT_PASS:-argo-production}
      SURREAL_LOG: warn
      SURREAL_PATH: rocksdb:///data
    command: start
    networks:
      - argo-network

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__HTTP_PORT: "6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - argo-network

  argo-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      surrealdb:
        condition: service_started
      qdrant:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - SURREAL_URL=http://surrealdb:8000
      - SURREAL_NS=argo
      - SURREAL_DB=production
      - QDRANT_URL=http://qdrant:6333
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RUST_LOG=info
    volumes:
      - ./config:/app/config:ro
      - agent_workspace:/app/workspace
    networks:
      - argo-network

volumes:
  redis_data:
  surreal_data:
  qdrant_data:
  agent_workspace:

networks:
  argo-network:
    driver: bridge
